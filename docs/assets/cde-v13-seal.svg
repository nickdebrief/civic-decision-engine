<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Civic Decision Engine v13 seal">
  <title>Civic Decision Engine v13 seal</title>
  <desc>Legacy-style Civic Decision Engine seal with a teal oval, classical column symbol, and v13 version mark.</desc>

  <rect width="220" height="220" fill="white"/>

  <ellipse
    cx="110"
    cy="110"
    rx="68"
    ry="102"
    stroke="#078EA2"
    stroke-width="6"
    fill="white"
  />

  <g fill="#078EA2">
    <rect x="77" y="42" width="66" height="7" rx="3.5"/>
    <rect x="76" y="58" width="68" height="7" rx="3.5"/>
    <rect x="82" y="75" width="58" height="7" rx="3.5"/>

    <rect x="89" y="77" width="7" height="65" rx="3.5"/>
    <rect x="102" y="77" width="7" height="65" rx="3.5"/>
    <rect x="115" y="77" width="7" height="65" rx="3.5"/>
    <rect x="128" y="77" width="7" height="65" rx="3.5"/>

    <text
      x="110"
      y="177"
      text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="46"
      font-weight="700"
      letter-spacing="-1.5"
    >v13</text>
  </g>
</svg>
