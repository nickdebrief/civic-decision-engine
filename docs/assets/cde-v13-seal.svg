<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Civic Decision Engine v13 seal">
  <defs>
    <linearGradient id="ring" x1="30" y1="30" x2="190" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E8B9A"/>
      <stop offset="1" stop-color="#1F5A65"/>
    </linearGradient>
  </defs>

  <circle cx="110" cy="110" r="96" stroke="url(#ring)" stroke-width="8" fill="white"/>

  <circle cx="110" cy="110" r="78" stroke="#2E8B9A" stroke-width="2" fill="none" opacity="0.55"/>

  <text x="110" y="58"
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="12"
        font-weight="700"
        letter-spacing="1.6"
        fill="#1F2D3D">
    CIVIC DECISION ENGINE
  </text>

  <text x="110" y="118"
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="52"
        font-weight="800"
        fill="#2E8B9A">
    v13
  </text>

  <text x="110" y="142"
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="11"
        font-weight="600"
        letter-spacing="1.8"
        textLength="184"
        lengthAdjust="spacingAndGlyphs"
        fill="#1F2D3D">
    INDEPENDENT · TRANSPARENT · TRACEABLE
  </text>

  <text x="110" y="170"
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="10"
        font-weight="700"
        letter-spacing="2"
        fill="#4B5B6A">
    PLATFORM RELEASE
  </text>
</svg>
