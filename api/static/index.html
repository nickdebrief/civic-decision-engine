<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Civic Decision Engine</title>

<style>
:root {
  --bg:#05070b;
  --panel:#0b1220;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --line:#1f2937;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,system-ui;
}

.page{
  max-width:1400px;
  margin:auto;
  padding:30px;
}

.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px;
}

textarea,input,select{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid #243042;
  background:#040814;
  color:white;
}

button{
  padding:12px 18px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.primary{background:white;color:black;}

.signal-card{
  border:1px solid #243042;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>
<div class="page">

<div class="main">

<div class="panel">
<h2>Enter a case</h2>

<textarea id="what" placeholder="Describe the situation..."></textarea>
<input id="who" placeholder="Who is involved?" />

<select id="response">
<option value="no_response">No response</option>
<option value="acknowledged_only">Acknowledged only</option>
</select>

<input id="days" type="number" placeholder="Days open" />

<select id="stage">
<option value="awaiting_response">Awaiting response</option>
<option value="delayed">Delayed</option>
<option value="escalated">Escalated</option>
</select>

<select id="urgency">
<option value="low">Low</option>
<option value="medium" selected>Medium</option>
<option value="high">High</option>
</select>

<input id="outcome" placeholder="Desired outcome" />

<button class="primary" onclick="run()">Run analysis</button>
</div>

<div class="panel">
<h2>Analysis</h2>

<h3>What is happening</h3>
<div id="happening">Awaiting input.</div>

<h3>What it means</h3>
<div id="meaning"></div>

<h3>System state</h3>
<div id="state"></div>

<h3>Signals</h3>
<div id="signals"></div>

<h3>Raw</h3>
<pre id="raw"></pre>
</div>

</div>
</div>
<script>

const SIGNAL_MAP = {
TRANSITION_DETECTED:{
title:"Transition detected",
description:"Movement between behavioural conditions has been identified."
},
ESCALATION_WITHOUT_RESPONSE_PRESENT:{
title:"Escalation without response present",
description:"Escalation is occurring without corresponding institutional action."
}
};

function buildPayload(){
return {
cases:[{
strike_reference:`Generated-${Date.now()}`,
case_title:"User case",
civic_domain:"local_government",
decision_trigger:document.getElementById("what").value,
desired_outcome:document.getElementById("outcome").value,
urgency:document.getElementById("urgency").value,
institutions:[document.getElementById("who").value || "Institution"],
case_lifecycle:{
current_stage:document.getElementById("stage").value,
status:"active",
stalled:true,
days_open:parseInt(document.getElementById("days").value||"0")
}
}]
};
}

async function run(){

const payload = buildPayload();

const [tRes,pRes] = await Promise.all([
fetch("/timeline",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),
fetch("/pattern",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
]);

const t = await tRes.json();
const p = await pRes.json();

document.getElementById("raw").textContent = JSON.stringify({t,p},null,2);

const tr = t.results?.[0] || {};
const pr = p.results?.[0] || {};

document.getElementById("happening").textContent = JSON.stringify(tr,null,2);
document.getElementById("meaning").textContent = pr.pattern_summary || "";
document.getElementById("state").textContent = pr.system_state || "";

renderSignals(pr.signals||[]);
}

function renderSignals(signals){

const box = document.getElementById("signals");

if(!signals.length){
box.innerHTML="No signals";
return;
}

box.innerHTML = signals.map(s=>{
const m = SIGNAL_MAP[s] || {title:s,description:""};
return `<div class="signal-card"><strong>${m.title}</strong><br>${m.description}</div>`;
}).join("");
}

</script>

</body>
</html>
