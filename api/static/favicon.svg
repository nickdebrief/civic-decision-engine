  <rect x="244" y="190" width="14" height="130" rx="4" class="fill"/>
  <rect x="278" y="190" width="14" height="130" rx="4" class="fill"/>
  <rect x="312" y="190" width="14" height="130" rx="4" class="fill"/>

  <!-- Version text -->
